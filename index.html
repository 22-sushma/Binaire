<!DOCTYPE html>
<html>
<head>
  <title>Netflix UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- LOGIN SCREEN -->
<div id="loginScreen">
  <h1>Welcome to MyFlix 🎬</h1>
  <input type="text" placeholder="Enter username" id="username">
  <br><br>
  <button onclick="login()">Sign In</button>
  <button onclick="guestLogin()">Continue as Guest</button>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none;">

    </div>

  <!-- Navbar -->
  <nav>
  <h2>MyFlix</h2>

  <div>
    <button onclick="showAll()">Home</button>
    <button onclick="filterTV()">TV Shows</button>
    <button onclick="filterMovies()">Movies</button>
    <button onclick="filterGames()">Video Games</button>
  </div>

  <input type="text" id="search" placeholder="Search...">
</nav>

<h2>🔥 Top Show</h2>
<div id="topShow"></div>

  <!-- Movie Container -->
  <div id="movies"></div>

  <script src="script.js"></script>
</body>
</html>
